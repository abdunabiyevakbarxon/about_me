<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Portfolio</title>

<style>
    /* 🌈 Animated background */
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    /* 📦 top buttons */
    .topbar {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 10;
        animation: fadeIn 1.5s ease;
    }

    .btn {
        padding: 10px 15px;
        margin-right: 10px;
        border-radius: 8px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        display: inline-block;
    }

    .open { background: #007bff; }
    .download { background: #28a745; }

    .btn:hover {
        opacity: 0.8;
    }

    /* 📄 FULL SCREEN PDF */
    .pdf-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        animation: fadeIn 2s ease;
    }

    /* ✨ fade animation */
    @keyframes fadeIn {
        from {opacity: 0; transform: scale(0.98);}
        to {opacity: 1; transform: scale(1);}
    }

</style>
</head>

<body>
<!-- Buttons 
<div class="topbar">
    <a class="btn open" href="aboutme.pdf" target="_blank">📄 Ochish</a>
    <a class="btn download" href="aboutme.pdf" download>⬇️ Yuklab olish</a>
</div>-->

<!-- FULL SCREEN PDF -->
<embed class="pdf-view" src="aboutme.pdf" type="application/pdf">

</body>
</html>
